<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #f4f6f9;
    }

    #grid {
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    /* ===== VirtualGridTable (no <table>, no native scrollbars) ===== */
    .vgt {
      --vgt-cols: 6;
      --vgt-row-h: 28px;
      --vgt-head-h: 34px;
      --vgt-scroll-w: 22px;
      --vgt-hscroll-h: 12px;
      --vgt-radius: 10px;
      --vgt-pad-x: 8px;
      --vgt-border: rgba(0,0,0,.12);
      --vgt-bg: #fff;
      --vgt-head-bg: linear-gradient(180deg, #eef3f9, #e8eef6);
      --vgt-hover: rgba(38, 84, 124, .08);
      --vgt-muted: rgba(0,0,0,.55);

      width: 720px;
      height: 360px;
      background: linear-gradient(180deg, #ffffff, #fbfcfe);
      border: 1px solid var(--vgt-border);
      border-radius: var(--vgt-radius);
      overflow: hidden;
      user-select: none;
      font: 13px/1.2 "Segoe UI", "Aptos", "Calibri", system-ui, sans-serif;
      color: #111;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 28px rgba(20, 42, 69, 0.12);
    }
    .vgt, .vgt * { box-sizing: border-box; }

    .vgt__top {
      height: var(--vgt-head-h);
      display: grid;
      grid-template-columns: 34px 1fr 34px;
      align-items: stretch;
      border-bottom: 1px solid var(--vgt-border);
      background: var(--vgt-head-bg);
    }

    .vgt__btn {
      border: 0;
      background: transparent;
      cursor: pointer;
      font: inherit;
      color: #111;
      opacity: .75;
    }
    .vgt__btn:hover { opacity: 1; }
    .vgt__btn:disabled { opacity: .25; cursor: default; }

    .vgt__head {
      position: relative;
      display: grid;
      align-items: stretch;
      overflow: hidden;
    }

    .vgt__headInner {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      display: grid;
      will-change: transform;
    }

    .vgt__hcell {
      padding: 0 var(--vgt-pad-x);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      border-right: 1px solid rgba(0,0,0,.06);
    }
    .vgt__hcell:last-child { border-right: 0; }
    .vgt__hcell:hover { background: rgba(0,0,0,.02); }

    .vgt__sort {
      font-size: 11px;
      opacity: .65;
      flex: 0 0 auto;
    }

    .vgt__mid {
      flex: 1;
      position: relative;
      overflow: hidden; /* critical: no native scrolling */
    }

    .vgt__rows {
      position: absolute;
      left: 0;
      right: var(--vgt-scroll-w); /* reserve scrollbar lane */
      top: 0;
      bottom: var(--vgt-hscroll-h);
      overflow: hidden;
      z-index: 1;
    }

    .vgt__rowsInner {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      will-change: transform;
    }

    .vgt__row {
      height: var(--vgt-row-h);
      display: grid;
      grid-template-columns: repeat(var(--vgt-cols), minmax(0, 1fr));
      align-items: center;
      border-bottom: 1px solid rgba(0,0,0,.06);
      background: transparent;
    }
    .vgt__row:hover { background: var(--vgt-hover); }

    .vgt__cell {
      padding: 0 var(--vgt-pad-x);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-right: 1px solid rgba(0,0,0,.06);
    }
    .vgt__cell:last-child { border-right: 0; }

    .vgt__scroll {
      position: absolute;
      top: 0;
      right: 0;
      bottom: var(--vgt-hscroll-h);
      width: var(--vgt-scroll-w);
      display: grid;
      grid-template-rows: 18px 1fr 18px;
      background: rgba(33, 62, 95, .06);
      border-left: 1px solid rgba(15, 23, 42, .08);
      border-radius: 8px;
      overflow: visible;
      z-index: 2;
    }

    .vgt__hscroll {
      position: absolute;
      left: 0;
      right: var(--vgt-scroll-w);
      bottom: 0;
      height: var(--vgt-hscroll-h);
      background: rgba(33, 62, 95, .05);
      border-top: 1px solid rgba(15, 23, 42, .08);
      z-index: 2;
    }

    .vgt__htrack {
      position: absolute;
      left: 2px;
      right: 2px;
      top: 1px;
      bottom: 1px;
      border-radius: 999px;
      background: rgba(22, 48, 78, .14);
      overflow: hidden;
    }

    .vgt__hthumb {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 64px;
      border-radius: 999px;
      background: rgba(33, 62, 95, .72);
      cursor: pointer;
      touch-action: none;
      will-change: transform;
    }
    .vgt__hthumb:hover { background: rgba(27, 53, 83, .9); }

    .vgt__corner {
      position: absolute;
      right: 0;
      bottom: 0;
      width: var(--vgt-scroll-w);
      height: var(--vgt-hscroll-h);
      border-top: 1px solid rgba(15, 23, 42, .08);
      border-left: 1px solid rgba(15, 23, 42, .08);
      background: rgba(33, 62, 95, .06);
      z-index: 2;
    }

    .vgt__sbtn {
      border: 0;
      background: transparent;
      cursor: pointer;
      opacity: .6;
      font: 12px/1 system-ui;
    }
    .vgt__sbtn:hover { opacity: 1; }
    .vgt__sbtn:disabled { opacity: .25; cursor: default; }

    .vgt__track {
      position: relative;
      margin: 2px 3px;
      border-radius: 999px;
      background: rgba(22, 48, 78, .16);
      overflow: hidden;
    }

    .vgt__thumb {
      position: absolute;
      left: 0;
      right: 0;
      height: 24px;
      border-radius: 8px;
      background: rgba(33, 62, 95, .78);
      cursor: pointer;
      touch-action: none;
      will-change: transform;
    }
    .vgt__thumb:hover { background: rgba(27, 53, 83, .9); }

    .vgt__overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--vgt-muted);
      background: linear-gradient(to bottom, rgba(255,255,255,.92), rgba(255,255,255,.92));
      pointer-events: none;
    }
    .vgt__overlay[data-show="1"] { display: flex; }

    .vgt__footer {
      height: 34px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-top: 1px solid var(--vgt-border);
      background: linear-gradient(180deg, #f6f8fb, #eef2f7);
      padding: 0 8px;
      gap: 8px;
    }

    .vgt__status {
      color: var(--vgt-muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vgt__pager {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
    }

    .vgt__pill {
      border: 1px solid rgba(0,0,0,.14);
      background: linear-gradient(180deg, #fff, #f7f9fb);
      border-radius: 999px;
      padding: 6px 10px;
      font: inherit;
      cursor: pointer;
      opacity: .9;
    }
    .vgt__pill:hover { opacity: 1; }
    .vgt__pill:disabled { opacity: .35; cursor: default; }
  </style>
</head>
<body>
  <div id="grid"></div>

  <script>
    class VirtualGridTable {
      constructor(containerId, opts = {}) {
        const el = document.getElementById(containerId);
        if (!el) throw new Error("VirtualGridTable: container not found: " + containerId);

        this._host = el;
        this._opts = {
          width: opts.width ?? "100%",
          height: opts.height ?? "100%",
          rowHeight: opts.rowHeight ?? 28,
          visibleCols: opts.visibleCols ?? 6,
          overscan: opts.overscan ?? 2,
        };

        // Data/state
        this._columns = [];      // [{key,label}]
        this._rows = [];         // array-of-arrays
        this._view = null;       // null => identity, else indices[]
        this._viewCount = 0;

        this._filters = null;    // null | fn(rowArr, baseIndex) => bool
        this._searchQ = "";      // lowercased
        this._searchCol = -1;    // -1 => all columns, else absolute column index
        this._sort = null;       // { colIndex, dir: 1|-1 }

        this._searchCache = [];  // per base row: lowercased searchable string | null
        this._searchColCache = []; // per base row: Array<string|null> for per-col

        // Virtual scroll state (pixel-based, like native)
        this._scrollPx = 0;
        this._rowStart = 0;
        this._subPx = 0;

        // Horizontal virtual scroll (pixel-based)
        this._scrollXPx = 0;
        this._colStart = 0;
        this._subXPx = 0;
        this._xOverscan = 1;
        this._colW = 120;

        // Measured
        this._bodyH = 0;
        this._bodyW = 0;
        this._renderRows = 0;
        this._renderCols = 0;

        // UI state
        this._loading = false;

        this._build();
        this._measure();
        this._rebuildBodyPool();
        this._renderAll();
      }

      /* ===================== Public API ===================== */

      setLoading(isLoading) {
        this._loading = !!isLoading;
        this._renderOverlay();
      }

      // Accepts:
      // 1) { columns: [], rows: [][] }
      // 2) array of homogenous objects
      setData(data) {
        let columns, rows;

        if (Array.isArray(data)) {
          if (data.length === 0) {
            columns = [];
            rows = [];
          } else {
            const keys = Object.keys(data[0]);
            columns = keys.map(k => ({ key: k, label: k }));
            rows = data.map(o => keys.map(k => o[k]));
          }
        } else if (data && typeof data === "object" && Array.isArray(data.rows)) {
          columns = (data.columns ?? []).map(c => {
            if (typeof c === "string") return { key: c, label: c };
            if (c && typeof c === "object") return { key: c.key ?? c.label, label: c.label ?? c.key };
            return { key: String(c), label: String(c) };
          });
          rows = data.rows;
        } else {
          throw new Error("VirtualGridTable.setData: invalid input");
        }

        this._columns = columns;
        this._rows = rows || [];

        // Reset caches/pipeline
        this._searchCache = new Array(this._rows.length).fill(null);
        this._searchColCache = new Array(this._rows.length);
        for (let i = 0; i < this._rows.length; i++) this._searchColCache[i] = null;
        this._scrollXPx = 0;
        this._scrollPx = 0;
        this._sort = null;

        this._recomputeView();
        this._renderAll();
      }

      setSearch(query) {
        this._searchQ = (query ?? "").toString().trim().toLowerCase();
        this._recomputeView();
        this._renderAll();
      }

      setSearchColumn(absColIndexOrAll) {
        // absColIndexOrAll: -1 means "All"
        const v = (absColIndexOrAll == null) ? -1 : (absColIndexOrAll | 0);
        this._searchCol = v;
        this._recomputeView();
        this._renderAll();
      }

      clearSearch() {
        this.setSearch("");
      }

      // filterFn(rowArr, baseIndex) => boolean
      setFilter(filterFn) {
        this._filters = (typeof filterFn === "function") ? filterFn : null;
        this._recomputeView();
        this._renderAll();
      }

      clearFilter() {
        this.setFilter(null);
      }

      // dir: "asc" | "desc" | null
      sortBy(colIndex, dir) {
        if (dir == null) {
          this._sort = null;
        } else {
          this._sort = { colIndex: colIndex | 0, dir: (dir === "desc" ? -1 : 1) };
        }
        this._recomputeView();   // sorting only affects order, not membership
        this._renderAll();
      }

      clearSort() {
        this.sortBy(0, null);
      }

      // Useful if you want external controls
      getOffsets() {
        return {
          rowPx: this._scrollPx,
          rowStart: this._rowStart,
          colPx: this._scrollXPx,
          colStart: this._colStart,
        };
      }

      destroy() {
        this._ro?.disconnect();
        this._root?.remove();
      }

      /* ===================== Build/Measure ===================== */

      _build() {
        const o = this._opts;

        const root = document.createElement("div");
        root.className = "vgt";
        root.style.width = (typeof o.width === "number") ? (o.width + "px") : String(o.width);
        root.style.height = (typeof o.height === "number") ? (o.height + "px") : String(o.height);
        root.style.setProperty("--vgt-row-h", o.rowHeight + "px");
        root.style.setProperty("--vgt-cols", String(o.visibleCols));
        this._root = root;

        // Header: [<] [grid] [>]
        const top = document.createElement("div");
        top.className = "vgt__top";

        const btnLeft = document.createElement("button");
        btnLeft.className = "vgt__btn";
        btnLeft.textContent = "◀";
        btnLeft.addEventListener("click", () => this._scrollXBy(-this._bodyW));

        const head = document.createElement("div");
        head.className = "vgt__head";
        this._head = head;
        const headInner = document.createElement("div");
        headInner.className = "vgt__headInner";
        this._headInner = headInner;
        head.append(headInner);

        const btnRight = document.createElement("button");
        btnRight.className = "vgt__btn";
        btnRight.textContent = "▶";
        btnRight.addEventListener("click", () => this._scrollXBy(+this._bodyW));

        top.append(btnLeft, head, btnRight);

        // Body/viewport
        const mid = document.createElement("div");
        mid.className = "vgt__mid";
        this._mid = mid;

        const rows = document.createElement("div");
        rows.className = "vgt__rows";
        this._rowsHost = rows;

        const rowsInner = document.createElement("div");
        rowsInner.className = "vgt__rowsInner";
        this._rowsInner = rowsInner;
        rows.append(rowsInner);

        // Custom scrollbar
        const scroll = document.createElement("div");
        scroll.className = "vgt__scroll";

        const sUp = document.createElement("button");
        sUp.className = "vgt__sbtn";
        sUp.textContent = "▲";
        sUp.addEventListener("click", () => this._scrollBy(-this._bodyH * 0.9));

        const track = document.createElement("div");
        track.className = "vgt__track";
        this._track = track;

        const thumb = document.createElement("div");
        thumb.className = "vgt__thumb";
        this._thumb = thumb;
        track.append(thumb);

        const sDown = document.createElement("button");
        sDown.className = "vgt__sbtn";
        sDown.textContent = "▼";
        sDown.addEventListener("click", () => this._scrollBy(+this._bodyH * 0.9));

        scroll.append(sUp, track, sDown);

        // Horizontal scrollbar
        const hscroll = document.createElement("div");
        hscroll.className = "vgt__hscroll";
        const htrack = document.createElement("div");
        htrack.className = "vgt__htrack";
        this._hTrack = htrack;
        const hthumb = document.createElement("div");
        hthumb.className = "vgt__hthumb";
        this._hThumb = hthumb;
        htrack.append(hthumb);
        hscroll.append(htrack);
        const corner = document.createElement("div");
        corner.className = "vgt__corner";

        // Overlay (No data / Loading)
        const overlay = document.createElement("div");
        overlay.className = "vgt__overlay";
        overlay.textContent = "No data to display";
        overlay.dataset.show = "1";
        this._overlay = overlay;

        mid.append(rows, scroll, hscroll, corner, overlay);

        // Footer: search + pager + status
        const footer = document.createElement("div");
        footer.className = "vgt__footer";

        const status = document.createElement("div");
        status.className = "vgt__status";
        this._status = status;

        // Search controls (left)
        const searchWrap = document.createElement("div");
        searchWrap.style.display = "inline-flex";
        searchWrap.style.gap = "8px";
        searchWrap.style.alignItems = "center";
        searchWrap.style.justifyContent = "flex-start";
        searchWrap.style.minWidth = "0";

        const sel = document.createElement("select");
        sel.style.border = "1px solid rgba(0,0,0,.14)";
        sel.style.borderRadius = "8px";
        sel.style.padding = "6px 8px";
        sel.style.background = "#fff";
        sel.style.font = "inherit";
        sel.style.maxWidth = "180px";
        sel.addEventListener("change", () => {
          this.setSearchColumn(parseInt(sel.value, 10));
        });
        this._searchSel = sel;

        const inp = document.createElement("input");
        inp.type = "search";
        inp.placeholder = "Search...";
        inp.autocomplete = "off";
        inp.spellcheck = false;
        inp.style.border = "1px solid rgba(0,0,0,.14)";
        inp.style.borderRadius = "8px";
        inp.style.padding = "6px 10px";
        inp.style.background = "#fff";
        inp.style.font = "inherit";
        inp.style.minWidth = "0";
        inp.style.width = "220px";
        inp.addEventListener("input", () => {
          this.setSearch(inp.value);
        });
        this._searchInp = inp;

        const clearBtn = document.createElement("button");
        clearBtn.className = "vgt__pill";
        clearBtn.textContent = "Clear";
        clearBtn.addEventListener("click", () => {
          this._searchInp.value = "";
          this._searchSel.value = "-1";
          this._searchCol = -1;
          this.setSearch("");
        });

        searchWrap.append(sel, inp, clearBtn);

        const pager = document.createElement("div");
        pager.className = "vgt__pager";

        const pUp = document.createElement("button");
        pUp.className = "vgt__pill";
        pUp.textContent = "Page Up";
        pUp.addEventListener("click", () => this._scrollBy(-this._bodyH));

        const pDown = document.createElement("button");
        pDown.className = "vgt__pill";
        pDown.textContent = "Page Down";
        pDown.addEventListener("click", () => this._scrollBy(+this._bodyH));

        pager.append(pUp, pDown);

        // Footer layout: left=search, center=pager, right=status
        footer.style.gridTemplateColumns = "1fr auto 1fr";
        footer.append(searchWrap, pager, status);

        root.append(top, mid, footer);

        // Mount
        this._host.innerHTML = "";
        this._host.append(root);

        this._btnLeft = btnLeft;
        this._btnRight = btnRight;
        this._sUp = sUp;
        this._sDown = sDown;
        this._pUp = pUp;
        this._pDown = pDown;

        // After mount:
        this._renderSearchOptions();

        // Wheel scrolling (no native scroll)
        mid.addEventListener("wheel", (e) => {
          const horizontalIntent = e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY);
          if (horizontalIntent) {
            e.preventDefault();
            const dx = e.shiftKey ? e.deltaY : e.deltaX;
            this._scrollXBy(dx);
            return;
          }
          e.preventDefault();
          this._scrollBy(e.deltaY);
        }, { passive: false });

        // Keyboard navigation
        root.tabIndex = 0;
        root.addEventListener("keydown", (e) => {
          const k = e.key;
          if (k === "PageDown") { e.preventDefault(); this._scrollBy(+this._bodyH); }
          else if (k === "PageUp") { e.preventDefault(); this._scrollBy(-this._bodyH); }
          else if (k === "Home") { e.preventDefault(); this._setScrollPx(0); }
          else if (k === "End") { e.preventDefault(); this._setScrollPx(this._maxScrollPx()); }
          else if (k === "ArrowDown") { e.preventDefault(); this._scrollBy(this._opts.rowHeight); }
          else if (k === "ArrowUp") { e.preventDefault(); this._scrollBy(-this._opts.rowHeight); }
          else if (k === "ArrowRight") { e.preventDefault(); this._scrollXBy(this._colW); }
          else if (k === "ArrowLeft") { e.preventDefault(); this._scrollXBy(-this._colW); }
        });

        // Scrollbar thumb dragging
        thumb.addEventListener("pointerdown", (e) => this._thumbDragStart(e));
        track.addEventListener("pointerdown", (e) => {
          if (e.target === thumb) return;
          const r = track.getBoundingClientRect();
          const y = e.clientY - r.top;
          const ratio = this._ratioFromTrackY(y);
          this._setScrollPx(ratio * this._maxScrollPx());
        });

        // Horizontal scrollbar thumb dragging
        hthumb.addEventListener("pointerdown", (e) => this._hThumbDragStart(e));
        htrack.addEventListener("pointerdown", (e) => {
          if (e.target === hthumb) return;
          const r = htrack.getBoundingClientRect();
          const x = e.clientX - r.left;
          const ratio = this._ratioFromHTrackX(x);
          this._setScrollXPx(ratio * this._maxScrollXPx());
        });

        // ResizeObserver for exact sizing
        this._ro = new ResizeObserver(() => {
          this._measure();
          this._rebuildBodyPool();
          this._clampScroll();
          this._renderAll();
        });
        this._ro.observe(mid);
      }

      _measure() {
        const rowsRect = this._rowsHost.getBoundingClientRect();
        this._bodyH = Math.max(0, rowsRect.height);
        this._bodyW = Math.max(0, rowsRect.width);
        this._colW = Math.max(56, this._bodyW / Math.max(1, this._opts.visibleCols));
      }

      _rebuildBodyPool() {
        // Rendered pool = visible rows + overscan on both sides.
        const rh = this._opts.rowHeight;
        const visRows = Math.max(1, Math.ceil(this._bodyH / rh));
        const pool = visRows + (this._opts.overscan * 2);
        const visCols = Math.max(1, Math.ceil(this._bodyW / Math.max(1, this._colW)));
        const renderCols = visCols + (this._xOverscan * 2);

        if (pool === this._renderRows && renderCols === this._renderCols && this._rowEls?.length) return;

        this._renderRows = pool;
        this._renderCols = renderCols;
        this._rowEls = [];

        const inner = this._rowsInner;
        inner.innerHTML = "";

        for (let i = 0; i < pool; i++) {
          const rowEl = document.createElement("div");
          rowEl.className = "vgt__row";
          rowEl.dataset.pool = String(i);

          const cellEls = [];
          for (let c = 0; c < renderCols; c++) {
            const cell = document.createElement("div");
            cell.className = "vgt__cell";
            cell.textContent = "";
            rowEl.append(cell);
            cellEls.push(cell);
          }

          inner.append(rowEl);
          this._rowEls.push({ rowEl, cellEls, baseIndex: -1 });
        }
      }

      /* ===================== Data pipeline ===================== */

      _recomputeView() {
        const n = this._rows.length;
        this._view = null;
        this._viewCount = n;

        const hasFilter = !!this._filters;
        const hasSearch = this._searchQ.length > 0;
        const hasSort = !!this._sort;

        if (!hasFilter && !hasSearch && !hasSort) return;

        // Start from identity indices; only allocate when needed.
        let idx = new Array(n);
        for (let i = 0; i < n; i++) idx[i] = i;

        if (hasFilter) {
          const fn = this._filters;
          idx = idx.filter(i => !!fn(this._rows[i], i));
        }

        if (hasSearch) {
          const q = this._searchQ;
          const sc = this._searchCol | 0;
          if (sc < 0) {
            idx = idx.filter(i => this._rowSearchStr(i).includes(q));
          } else {
            idx = idx.filter(i => this._rowSearchColStr(i, sc).includes(q));
          }
        }

        if (hasSort) {
          const { colIndex, dir } = this._sort;
          idx.sort((ia, ib) => {
            const a = this._rows[ia]?.[colIndex];
            const b = this._rows[ib]?.[colIndex];
            const c = this._cmp(a, b);
            if (c !== 0) return c * dir;
            return ia - ib; // stable
          });
        }

        this._view = idx;
        this._viewCount = idx.length;
      }

      _rowSearchStr(baseIndex) {
        let s = this._searchCache[baseIndex];
        if (s != null) return s;
        const row = this._rows[baseIndex] || [];
        // Fast-ish join without allocations per cell beyond String()
        let out = "";
        for (let i = 0; i < row.length; i++) {
          const v = row[i];
          if (v == null) continue;
          out += String(v).toLowerCase();
          out += "\u0001";
        }
        this._searchCache[baseIndex] = out;
        return out;
      }

      _rowSearchColStr(baseIndex, absColIndex) {
        let rowCache = this._searchColCache[baseIndex];
        if (rowCache == null) {
          rowCache = new Array(this._columns.length).fill(null);
          this._searchColCache[baseIndex] = rowCache;
        }

        let s = rowCache[absColIndex];
        if (s != null) return s;

        const row = this._rows[baseIndex] || [];
        const v = row[absColIndex];
        const out = (v == null) ? "" : String(v).toLowerCase();
        rowCache[absColIndex] = out;
        return out;
      }

      _cmp(a, b) {
        // Numeric if both are finite numbers (or numeric strings)
        const an = (typeof a === "number") ? a : (a != null && a !== "" ? Number(a) : NaN);
        const bn = (typeof b === "number") ? b : (b != null && b !== "" ? Number(b) : NaN);
        const aNum = Number.isFinite(an);
        const bNum = Number.isFinite(bn);
        if (aNum && bNum) return an < bn ? -1 : (an > bn ? 1 : 0);

        const sa = (a == null) ? "" : String(a);
        const sb = (b == null) ? "" : String(b);
        return sa < sb ? -1 : (sa > sb ? 1 : 0);
      }

      _viewIndexToBase(i) {
        if (i < 0 || i >= this._viewCount) return -1;
        return this._view ? this._view[i] : i;
      }

      /* ===================== Rendering ===================== */

      _renderAll() {
        this._renderHeader();
        this._renderBody();
        this._renderScrollbar();
        this._renderHScrollbar();
        this._renderOverlay();
        this._renderStatus();
        this._renderNavDisabled();
        this._renderSearchOptions();
      }

      _renderHeader() {
        const head = this._headInner;
        const cols = this._columns;
        const slots = Math.max(1, this._renderCols || this._opts.visibleCols);

        const rawCol = Math.floor(this._scrollXPx / Math.max(1, this._colW));
        const subXPx = this._scrollXPx - (rawCol * this._colW);
        const start = Math.max(0, rawCol - this._xOverscan);
        const appliedOverscan = rawCol - start;
        this._colStart = rawCol;
        this._subXPx = subXPx;

        // Ensure header cells exist
        if (!this._hcells || this._hcells.length !== slots) {
          head.innerHTML = "";
          this._hcells = [];
          for (let slot = 0; slot < slots; slot++) {
            const hc = document.createElement("div");
            hc.className = "vgt__hcell";
            hc.dataset.slot = String(slot);

            // IMPORTANT: compute absolute col index at click time
            hc.addEventListener("click", () => {
              const abs = parseInt(hc.dataset.abs || "-1", 10) | 0;
              if (abs >= 0) this._toggleSort(abs);
            });

            head.append(hc);
            this._hcells.push(hc);
          }
        }

        head.style.gridTemplateColumns = `repeat(${slots}, ${this._colW}px)`;
        head.style.width = (slots * this._colW) + "px";
        head.style.transform = `translateX(${-subXPx - (appliedOverscan * this._colW)}px)`;

        for (let slot = 0; slot < slots; slot++) {
          const abs = start + slot;
          const col = cols[abs];
          const hc = this._hcells[slot];
          hc.dataset.abs = String(abs);

          if (!col) {
            hc.textContent = "";
            hc.style.pointerEvents = "none";
            hc.style.opacity = ".35";
            continue;
          }

          hc.style.pointerEvents = "auto";
          hc.style.opacity = "1";

          const label = col.label ?? col.key ?? "";
          const sortMark = (this._sort && this._sort.colIndex === abs)
            ? (this._sort.dir === 1 ? "^" : "v")
            : "";

          hc.innerHTML = "";
          const span = document.createElement("span");
          span.textContent = label;
          hc.append(span);

          if (sortMark) {
            const s = document.createElement("span");
            s.className = "vgt__sort";
            s.textContent = sortMark;
            hc.append(s);
          }
        }
      }

      _renderSearchOptions() {
        if (!this._searchSel) return;

        const sel = this._searchSel;
        const cols = this._columns;

        sel.innerHTML = "";

        const optAll = document.createElement("option");
        optAll.value = "-1";
        optAll.textContent = "All columns";
        sel.append(optAll);

        for (let i = 0; i < cols.length; i++) {
          const c = cols[i];
          const opt = document.createElement("option");
          opt.value = String(i);
          opt.textContent = (c && (c.label ?? c.key)) ? String(c.label ?? c.key) : ("Col " + (i + 1));
          sel.append(opt);
        }

        sel.value = String(this._searchCol ?? -1);
      }

      _renderBody() {
        const rh = this._opts.rowHeight;
        const pool = this._rowEls;
        const slots = Math.max(1, this._renderCols || this._opts.visibleCols);

        const maxPx = this._maxScrollPx();
        if (maxPx <= 0) this._scrollPx = 0;
        const maxXPx = this._maxScrollXPx();
        if (maxXPx <= 0) this._scrollXPx = 0;

        const rawStart = Math.floor(this._scrollPx / rh);
        const subPx = this._scrollPx - (rawStart * rh);
        const rawCol = Math.floor(this._scrollXPx / Math.max(1, this._colW));
        const subXPx = this._scrollXPx - (rawCol * this._colW);

        // overscan above
        const start = Math.max(0, rawStart - this._opts.overscan);
        const colStart = Math.max(0, rawCol - this._xOverscan);

        this._rowStart = rawStart;
        this._subPx = subPx;
        this._colStart = rawCol;
        this._subXPx = subXPx;

        // Translate pool smoothly (pixel-perfect)
        const appliedOverscan = rawStart - start;
        const appliedColOverscan = rawCol - colStart;
        const translateY = -subPx - (appliedOverscan * rh);
        const translateX = -subXPx - (appliedColOverscan * this._colW);
        this._rowsInner.style.transform = "translate(" + translateX + "px, " + translateY + "px)";
        this._rowsInner.style.width = (slots * this._colW) + "px";

        for (let i = 0; i < pool.length; i++) {
          const viewI = start + i;
          const baseIndex = this._viewIndexToBase(viewI);
          const rowSlot = pool[i];
          rowSlot.rowEl.style.gridTemplateColumns = `repeat(${slots}, ${this._colW}px)`;
          rowSlot.rowEl.style.width = (slots * this._colW) + "px";

          if (baseIndex < 0) {
            rowSlot.rowEl.style.visibility = "hidden";
            rowSlot.baseIndex = -1;
            continue;
          }

          rowSlot.rowEl.style.visibility = "visible";
          rowSlot.baseIndex = baseIndex;

          const row = this._rows[baseIndex] || [];
          for (let c = 0; c < slots; c++) {
            const v = row[colStart + c];
            rowSlot.cellEls[c].textContent = (v == null) ? "" : String(v);
          }
        }
      }

      _renderScrollbar() {
        const track = this._track;
        const thumb = this._thumb;

        const trackH = track.getBoundingClientRect().height;
        const contentH = this._viewCount * this._opts.rowHeight;
        const viewH = this._bodyH;

        if (contentH <= 0 || viewH <= 0 || contentH <= viewH) {
          thumb.style.height = Math.max(18, trackH) + "px";
          thumb.style.transform = "translateY(0px)";
          this._thumbDisabled = true;
          return;
        }

        this._thumbDisabled = false;

        const minThumb = 18;
        const h = Math.max(minThumb, Math.floor(trackH * (viewH / contentH)));
        const maxTop = Math.max(0, trackH - h);

        const ratio = this._maxScrollPx() > 0 ? (this._scrollPx / this._maxScrollPx()) : 0;
        const top = Math.floor(maxTop * this._clamp01(ratio));

        thumb.style.height = h + "px";
        thumb.style.transform = "translateY(" + top + "px)";
      }

      _renderHScrollbar() {
        const track = this._hTrack;
        const thumb = this._hThumb;
        if (!track || !thumb) return;

        const trackW = track.getBoundingClientRect().width;
        const contentW = this._columns.length * this._colW;
        const viewW = this._bodyW;

        if (contentW <= 0 || viewW <= 0 || contentW <= viewW) {
          thumb.style.width = Math.max(24, trackW) + "px";
          thumb.style.transform = "translateX(0px)";
          this._hThumbDisabled = true;
          return;
        }

        this._hThumbDisabled = false;
        const minThumb = 24;
        const w = Math.max(minThumb, Math.floor(trackW * (viewW / contentW)));
        const maxLeft = Math.max(0, trackW - w);
        const ratio = this._maxScrollXPx() > 0 ? (this._scrollXPx / this._maxScrollXPx()) : 0;
        const left = Math.floor(maxLeft * this._clamp01(ratio));

        thumb.style.width = w + "px";
        thumb.style.transform = "translateX(" + left + "px)";
      }

      _renderOverlay() {
        const hasData = this._viewCount > 0;
        if (this._loading) {
          this._overlay.textContent = "Loading…";
          this._overlay.dataset.show = "1";
        } else if (!hasData) {
          this._overlay.textContent = "No data to display";
          this._overlay.dataset.show = "1";
        } else {
          this._overlay.dataset.show = "0";
        }
      }

      _renderStatus() {
        const total = this._rows.length;
        const shown = this._viewCount;
        const start = this._rowStart + 1;
        const end = Math.min(shown, this._rowStart + Math.ceil(this._bodyH / this._opts.rowHeight));
        const colTotal = this._columns.length;
        const visibleColCount = Math.max(1, Math.ceil(this._bodyW / Math.max(1, this._colW)));

        const colFrom = (colTotal === 0) ? 0 : (this._colStart + 1);
        const colTo = Math.min(colTotal, this._colStart + visibleColCount);

        let s = "";
        if (shown === 0) s = "0 rows";
        else s = `${start}-${end} of ${shown} rows`;

        if (shown !== total) s += ` (filtered from ${total})`;
        if (colTotal > 0) s += ` | cols ${colFrom}-${colTo} of ${colTotal}`;

        this._status.textContent = s;
      }

      _renderNavDisabled() {
        const canLeft = this._scrollXPx > 0;
        const canRight = this._scrollXPx < this._maxScrollXPx();

        this._btnLeft.disabled = !canLeft;
        this._btnRight.disabled = !canRight;

        const canV = this._maxScrollPx() > 0;
        this._sUp.disabled = !canV;
        this._sDown.disabled = !canV;
        this._pUp.disabled = !canV;
        this._pDown.disabled = !canV;
      }

      /* ===================== Interaction helpers ===================== */

      _toggleSort(absColIndex) {
        // Cycle: none -> asc -> desc -> none
        if (!this._sort || this._sort.colIndex !== absColIndex) {
          this._sort = { colIndex: absColIndex, dir: 1 };
        } else if (this._sort.dir === 1) {
          this._sort = { colIndex: absColIndex, dir: -1 };
        } else {
          this._sort = null;
        }
        this._recomputeView();
        this._clampScroll();
        this._renderAll();
      }

      _scrollBy(deltaPx) {
        this._setScrollPx(this._scrollPx + deltaPx);
      }

      _scrollXBy(deltaPx) {
        this._setScrollXPx(this._scrollXPx + deltaPx);
      }

      _setScrollPx(px) {
        this._scrollPx = this._clamp(px, 0, this._maxScrollPx());
        this._renderBody();
        this._renderScrollbar();
        this._renderStatus();
        this._renderNavDisabled();
      }

      _setScrollXPx(px) {
        this._scrollXPx = this._clamp(px, 0, this._maxScrollXPx());
        this._renderHeader();
        this._renderBody();
        this._renderHScrollbar();
        this._renderStatus();
        this._renderNavDisabled();
      }

      _clampScroll() {
        this._scrollPx = this._clamp(this._scrollPx, 0, this._maxScrollPx());
        this._scrollXPx = this._clamp(this._scrollXPx, 0, this._maxScrollXPx());
      }

      _maxScrollPx() {
        // Native-like pixel range: totalContentPx - viewportPx
        const content = this._viewCount * this._opts.rowHeight;
        const max = content - this._bodyH;
        return Math.max(0, Math.floor(max));
      }

      _maxScrollXPx() {
        const content = this._columns.length * this._colW;
        const max = content - this._bodyW;
        return Math.max(0, Math.floor(max));
      }

      _thumbDragStart(e) {
        if (this._thumbDisabled) return;
        e.preventDefault();
        this._thumb.setPointerCapture(e.pointerId);

        const track = this._track.getBoundingClientRect();
        const thumb = this._thumb.getBoundingClientRect();
        const grab = e.clientY - thumb.top; // where inside thumb we grabbed
        const maxThumbTop = Math.max(0, track.height - thumb.height);

        const onMove = (ev) => {
          ev.preventDefault();
          const y = ev.clientY - track.top - grab + (thumb.height * 0.0);
          const top = this._clamp(y, 0, maxThumbTop);
          const ratio = maxThumbTop > 0 ? (top / maxThumbTop) : 0;
          this._setScrollPx(ratio * this._maxScrollPx());
        };

        const onUp = (ev) => {
          try { this._thumb.releasePointerCapture(e.pointerId); } catch {}
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
        };

        window.addEventListener("pointermove", onMove, { passive: false });
        window.addEventListener("pointerup", onUp, { passive: true });
      }

      _hThumbDragStart(e) {
        if (this._hThumbDisabled) return;
        e.preventDefault();
        this._hThumb.setPointerCapture(e.pointerId);

        const track = this._hTrack.getBoundingClientRect();
        const thumb = this._hThumb.getBoundingClientRect();
        const grab = e.clientX - thumb.left;
        const maxLeft = Math.max(0, track.width - thumb.width);

        const onMove = (ev) => {
          ev.preventDefault();
          const x = ev.clientX - track.left - grab;
          const left = this._clamp(x, 0, maxLeft);
          const ratio = maxLeft > 0 ? (left / maxLeft) : 0;
          this._setScrollXPx(ratio * this._maxScrollXPx());
        };

        const onUp = () => {
          try { this._hThumb.releasePointerCapture(e.pointerId); } catch {}
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
        };

        window.addEventListener("pointermove", onMove, { passive: false });
        window.addEventListener("pointerup", onUp, { passive: true });
      }

      _ratioFromTrackY(trackY) {
        const track = this._track.getBoundingClientRect();
        const thumb = this._thumb.getBoundingClientRect();
        const trackH = track.height;
        const thumbH = thumb.height;
        const maxTop = Math.max(1, trackH - thumbH);
        const top = this._clamp(trackY - (thumbH / 2), 0, maxTop);
        return top / maxTop;
      }

      _ratioFromHTrackX(trackX) {
        const track = this._hTrack.getBoundingClientRect();
        const thumb = this._hThumb.getBoundingClientRect();
        const trackW = track.width;
        const thumbW = thumb.width;
        const maxLeft = Math.max(1, trackW - thumbW);
        const left = this._clamp(trackX - (thumbW / 2), 0, maxLeft);
        return left / maxLeft;
      }

      _clamp01(x) { return x < 0 ? 0 : (x > 1 ? 1 : x); }
      _clamp(x, lo, hi) { return x < lo ? lo : (x > hi ? hi : x); }
      _clampInt(x, lo, hi) { x = x | 0; return x < lo ? lo : (x > hi ? hi : x); }
    }

    // ===== Example usage =====
    const grid = new VirtualGridTable("grid", {
      rowHeight: 28,
      visibleCols: 6,
      overscan: 2,
    });

    grid.setLoading(true);

    // Array-of-objects input
    const demo = [];
    for (let i = 0; i < 50000; i++) {
      demo.push({
        id: i + 1,
        name: "Item " + (i + 1),
        qty: (i % 13) + 1,
        price: ((i % 97) + 1) * 1.25,
        category: ["A","B","C","D"][i % 4],
        note: (i % 5 === 0) ? "longer text that should ellipsize nicely" : "",
        ts: Date.now() - (i * 1000),
      });
    }

    setTimeout(() => {
      grid.setData(demo);
      grid.setLoading(false);

      // Examples of reversible operations:
      // grid.setSearch("item 42");
      // grid.clearSearch();
      // grid.setFilter((row) => row[2] > 5); // qty > 5 (after conversion, qty column index depends on object keys)
      // grid.clearFilter();
    }, 250);
  </script>
</body>
